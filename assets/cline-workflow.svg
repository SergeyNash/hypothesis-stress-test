  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="270" width="140" height="80" rx="14" fill="#EDE9FE" stroke="#7C3AED"/>
    <text x="580" y="300" class="card-title">Synthesis</text>
    <text x="580" y="322" class="card-sub">layer skill</text>
  </g>

  <g filter="url(#shadow)">
