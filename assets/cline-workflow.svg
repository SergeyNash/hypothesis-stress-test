  </defs>

  <rect width="900" height="520" fill="#F8FAFC"/>
  <text x="50" y="45" class="title">Cline Execution Flow</text>
  <text x="50" y="68" class="subtitle">Rules, skills, workflows, and Confluence MCP</text>

  <g filter="url(#shadow)">
