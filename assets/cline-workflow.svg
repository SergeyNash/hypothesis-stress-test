  <g filter="url(#shadow)">
    <rect x="430" y="95" width="150" height="45" rx="12" fill="#FFFFFF" stroke="#94A3B8"/>
    <text x="450" y="124" class="card-sub">.clinerules/</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="150" width="150" height="45" rx="12" fill="#FFFFFF" stroke="#94A3B8"/>
