  <line x1="190" y1="310" x2="215" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="310" x2="385" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="310" x2="555" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="310" x2="725" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="50" y="400" width="800" height="90" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="75" y="430" class="label">RUN_DIR / OUTPUTS</text>
    <text x="75" y="458" class="card-sub">hypothesis.md -&gt; role_outputs/* -&gt; market_analysis.md -&gt; hypothesis_map.md -&gt; hypothesis_digest.txt</text>
