      .card-title { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .card-sub { font: 400 13px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #64748b; }
