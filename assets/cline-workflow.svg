    <text x="70" y="140" class="label">USER</text>
    <text x="70" y="162" class="card-sub">PM in VS Code</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="95" width="160" height="100" rx="18" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
