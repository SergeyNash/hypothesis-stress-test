  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="95" width="170" height="45" rx="12" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="620" y="124" class="card-sub">/run-hypothesis.md</text>
  </g>

