    <text x="70" y="322" class="card-sub">input skill</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="270" width="140" height="80" rx="14" fill="#DBEAFE" stroke="#2563EB"/>
    <text x="240" y="300" class="card-title">Roles</text>
    <text x="240" y="322" class="card-sub">layer skill</text>
  </g>

  <g filter="url(#shadow)">
